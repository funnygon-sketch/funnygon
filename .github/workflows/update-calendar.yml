name: Update KBO calendar

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: KBO 일정 수집
        run: python crawl_kbo.py

      - name: 공휴일 수집
        env:
          HOLIDAY_API_KEY: ${{ secrets.HOLIDAY_API_KEY }}
        run: python fetch_holidays.py

      - name: ICS 생성
        run: python generate_ics.py

      - name: 변경사항 커밋
        run: |
          git config user.name "kbo-calendar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: 캘린더 자동 갱신 $(date +'%Y-%m-%d')"
          git push
