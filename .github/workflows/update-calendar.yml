yamlname: Update KBO calendar

on:
  schedule:
    - cron: "0 21 * * *"  # 매일 UTC 21:00 = KST 06:00
  workflow_dispatch: {}    # 수동 실행 버튼도 사용 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: KBO 일정 수집
        run: python scripts/crawl_kbo.py

      - name: 공휴일 수집
        env:
          HOLIDAY_API_KEY: ${{ secrets.HOLIDAY_API_KEY }}
        run: python scripts/fetch_holidays.py

      - name: ICS 생성
        run: python scripts/generate_ics.py

      - name: 변경사항 커밋
        run: |
          git config user.name "kbo-calendar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: 캘린더 자동 갱신 $(date +'%Y-%m-%d')"
          git push
